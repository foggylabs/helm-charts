        - kind: fixed
          description: "appVersion bumped v0.2.6 → v0.2.7 — completes the duplicate-migration fix. v0.2.6 made the SQL a no-op but dbmate still crashed on schema_migrations primary-key collision (both files shared timestamp 20260401120000). v0.2.7 renames the duplicate to 20260401120001 so dbmate records a distinct row. Fresh installs now apply cleanly and end up with the full alert-webhook schema (alert_events + webhook_tokens)."
