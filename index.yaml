apiVersion: v1
entries:
  foggy:
  - annotations:
      artifacthub.io/changes: |
        - kind: security
          description: "All container specs (three Deployments plus the wait-for-postgres initContainer) now declare a container-level securityContext satisfying the Kubernetes Pod Security Standards restricted profile — runAsNonRoot, explicit non-zero runAsUser matching each image's Dockerfile USER directive, allowPrivilegeEscalation false, capabilities drop ALL, seccompProfile RuntimeDefault. Previously these fields were undefined, so the pods would be rejected at admission time on clusters that enforce PSS restricted (common on security-conscious EKS/GKE). No runtime behaviour change on permissive clusters."
        - kind: added
          description: "console-backend now has a startupProbe (30 × 5s budget) wrapping the dbmate migration phase. Kubernetes disables readinessProbe and livenessProbe while startupProbe is active, so long migrations on large customer databases no longer race with the liveness kill timer."
      artifacthub.io/license: Apache-2.0
    apiVersion: v2
    appVersion: v0.3.0
    created: "2026-04-22T11:02:12.903682617Z"
    dependencies:
    - alias: postgresql
      condition: postgresql.enabled
      name: postgresql
      repository: oci://registry-1.docker.io/bitnamicharts
