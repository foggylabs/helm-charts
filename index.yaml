    version: 0.2.6
  - annotations:
      artifacthub.io/changes: |
        - kind: added
          description: "appVersion bumped to v0.3.0 — bundles BL-104 (UI-managed LLM provider API keys, Fernet-encrypted at rest; ANTHROPIC_API_KEY env var remains a bootstrap fallback) and BL-111 (self-hosted: one license-scoped workspace per install, named from license customer_name claim). No chart template changes; existing installs upgrade cleanly via `helm upgrade foggy foggy/foggy`."
        - kind: added
          description: "Public /api/v1/config endpoint (BL-101) exposes edition (cloud|self_hosted) and version signals for the Console frontend; no chart config needed — edition is derived from FOGGY_ADMIN_PASSWORD presence, which the chart already sets via the foggy-admin Secret."
