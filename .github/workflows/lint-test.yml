name: Lint and Test Charts

on:
  pull_request:
    paths:
      - "charts/**"
      - ".github/workflows/lint-test.yml"
      - "ct.yaml"

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.1

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch "${{ github.event.repository.default_branch }}")
          if [ -n "$changed" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --target-branch "${{ github.event.repository.default_branch }}" --config ct.yaml

      # TODO(foggy): re-enable `ct install` once the foggy-{agent,console-backend,console-frontend}
      # container packages on ghcr.io are flipped to public visibility. Today they are private
      # (the Foggy app does not yet enforce a license JWT, so public images + no license gate
      # would let anyone run the product for free). `ct install` spins up kind and tries to pull
      # the images anonymously, which 401s.
      #
      # Re-enable by restoring these steps AFTER:
      #   (a) `app/agent/app/license/...` implements offline Ed25519 JWT verification, AND
      #   (b) `ghcr.io/foggylabs/foggy-{agent,console-backend,console-frontend}` visibility is
      #        flipped to public (manual GitHub UI action per package).
      #
      #   - name: Create kind cluster
      #     if: steps.list-changed.outputs.changed == 'true'
      #     uses: helm/kind-action@v1.10.0
      #
      #   - name: Run chart-testing (install)
      #     if: steps.list-changed.outputs.changed == 'true'
      #     run: ct install --target-branch "${{ github.event.repository.default_branch }}" --config ct.yaml
