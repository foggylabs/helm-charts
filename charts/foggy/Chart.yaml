apiVersion: v2
name: foggy
description: Foggy - self-hosted AI-native observability for incident investigation
type: application
version: 0.2.7
appVersion: "v0.3.1"
kubeVersion: ">=1.27.0-0"
home: https://foggyhq.com
sources:
  - https://github.com/foggylabs/helm-charts
icon: https://foggyhq.com/favicon.png
maintainers:
  - name: foggylabs
    email: support@foggyhq.com
    url: https://github.com/foggylabs
keywords:
  - observability
  - incident-response
  - ai
  - kubernetes
  - sre
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/changes: |
    - kind: added
      description: "appVersion bumped to v0.3.1 — bundles four audit-findings fixes (see foggylabs/foggy release v0.3.1): Playground row cleanup on self-hosted (BL-111 regression), observability opt-out default via empty OTEL_EXPORTER_OTLP_ENDPOINT, uninstall-preserves-secrets documentation, unused import cleanup."
    - kind: added
      description: "console-backend and agent now receive SERVICE_VERSION env injected from Chart.AppVersion, so /api/v1/config reports the real version (previously stalled at the backend Python default 0.1.0)."
    - kind: changed
      description: "Observability is now opt-out by default: OTEL_EXPORTER_OTLP_ENDPOINT is explicitly set to empty on both Deployments. Customers who want OTel export set observability.otel.endpoint in values.yaml or extraEnv on either service. Fixes continuous StatusCode.UNAVAILABLE log noise on vanilla installs where no collector listens."
    - kind: fixed
      description: "NOTES.txt printed after helm install now describes the actual v0.3.1 post-install flow (first-login → license-activate → llm-provider-setup → workspace dashboard → Connectors page in the sidebar) instead of the stale Waiting-for-Data narrative."
dependencies:
  - name: postgresql
    version: "16.2.3"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: postgresql.enabled
    alias: postgresql
