apiVersion: v2
name: foggy
description: Foggy - self-hosted AI-native observability for incident investigation
type: application
version: 0.2.2
appVersion: "v0.2.6"
kubeVersion: ">=1.27.0-0"
home: https://foggyhq.com
sources:
  - https://github.com/foggylabs/helm-charts
icon: https://foggyhq.com/favicon.png
maintainers:
  - name: foggylabs
    email: support@foggyhq.com
    url: https://github.com/foggylabs
keywords:
  - observability
  - incident-response
  - ai
  - kubernetes
  - sre
annotations:
  artifacthub.io/changes: |
    - kind: fixed
      description: "appVersion bumped v0.2.5 → v0.2.6 — fresh self-hosted installs no longer crash on duplicate migration `create_webhook_tokens`. The duplicate is now a no-op; alert-webhooks feature schema (alert_events + webhook_tokens tables) is created correctly. Existing installs unaffected."
dependencies:
  - name: postgresql
    version: "16.2.3"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: postgresql.enabled
    alias: postgresql
