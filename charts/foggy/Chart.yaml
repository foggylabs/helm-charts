apiVersion: v2
name: foggy
description: Foggy - self-hosted AI-native observability for incident investigation
type: application
version: 0.2.1
appVersion: "v0.2.5"
kubeVersion: ">=1.27.0-0"
home: https://foggyhq.com
sources:
  - https://github.com/foggylabs/helm-charts
icon: https://foggyhq.com/favicon.png
maintainers:
  - name: foggylabs
    email: support@foggyhq.com
    url: https://github.com/foggylabs
keywords:
  - observability
  - incident-response
  - ai
  - kubernetes
  - sre
annotations:
  artifacthub.io/changes: |
    - kind: changed
      description: "appVersion bumped v0.2.4 → v0.2.5 — picks up multi-arch (linux/amd64 + linux/arm64) Foggy images. No chart template changes; existing deployments can upgrade transparently."
dependencies:
  - name: postgresql
    version: "16.2.3"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: postgresql.enabled
    alias: postgresql
