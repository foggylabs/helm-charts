apiVersion: v2
name: foggy
description: Foggy - self-hosted AI-native observability for incident investigation
type: application
version: 0.2.0
appVersion: "v0.2.4"
kubeVersion: ">=1.27.0-0"
home: https://foggyhq.com
sources:
  - https://github.com/foggylabs/helm-charts
icon: https://foggyhq.com/favicon.png
maintainers:
  - name: foggylabs
    email: support@foggyhq.com
    url: https://github.com/foggylabs
keywords:
  - observability
  - incident-response
  - ai
  - kubernetes
  - sre
annotations:
  artifacthub.io/changes: |
    - kind: added
      description: "Self-hosted license activation flow — first-login admin bootstrap, license JWT paste on /license-activate, license status card in Settings"
    - kind: added
      description: "ENABLE_ADMIN_PANEL and SEED_DEMO_PROJECT env flags wired into console-backend deployment (both default false in self-hosted mode)"
    - kind: changed
      description: "appVersion bumped v0.1.0 → v0.2.4 — tracks Foggy v0.2.4 release (security-hardened, pre-release audit complete, entrypoint respects sslmode in DATABASE_URL, asyncpg driver respects sslmode translation)"
    - kind: security
      description: "Chart now deploys Foggy images with Ed25519 license enforcement, OWASP nginx security headers, CORS default tightened to localhost:3000, and OpenVEX-documented non-reachable CVEs — see foggy repo CHANGELOG [0.2.0] through [0.2.4]"
    - kind: fixed
      description: "DATABASE_URL for the bundled PostgreSQL subchart now appends ?sslmode=disable since Bitnami Postgres has TLS off by default. External Postgres deployments (externalDatabase.url) are unaffected — operator controls sslmode directly."
dependencies:
  - name: postgresql
    version: "16.2.3"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: postgresql.enabled
    alias: postgresql
