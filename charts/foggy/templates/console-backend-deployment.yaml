apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "foggy.fullname" . }}-console-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "foggy.labels" . | nindent 4 }}
    app.kubernetes.io/component: console-backend
spec:
  replicas: {{ .Values.consoleBackend.replicas }}
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "foggy.componentSelectorLabels" (dict "ctx" . "component" "console-backend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "foggy.componentSelectorLabels" (dict "ctx" . "component" "console-backend") | nindent 8 }}
      {{- with .Values.consoleBackend.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.global.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.postgresql.enabled }}
      # BL-99: fresh-install race guard. Without this, console-backend
      # starts before the bundled Bitnami postgres pod is accepting
      # connections and hits 4-5 CrashLoopBackOff cycles while asyncpg
      # retries. K8s eventually converges, but the intermediate state
      # looks broken and `helm install --wait --timeout 5m` can give up
      # before self-healing completes. Pattern (busybox + nc -z) matches
      # Bitnami / Grafana / Linkerd helm charts.
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          securityContext:
            {{- include "foggy.containerSecurityContext" 65534 | nindent 12 }}
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Release.Name }}-postgresql 5432; do
                echo "waiting for {{ .Release.Name }}-postgresql:5432 to accept connections..."
                sleep 2
              done
              echo "postgres is ready."
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
      {{- end }}
      containers:
        - name: console-backend
          image: {{ include "foggy.image" (dict "ctx" . "image" .Values.consoleBackend.image) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            {{- include "foggy.containerSecurityContext" 1000 | nindent 12 }}
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          env:
            - name: AGENT_URL
              value: http://{{ include "foggy.fullname" . }}-agent:{{ .Values.agent.service.port }}
            - name: OTEL_SERVICE_NAME
              value: foggy-console-backend
            - name: LOG_LEVEL
              value: INFO
            {{- if .Values.postgresql.enabled }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgresql
                  key: password
            - name: DATABASE_URL
              value: {{ include "foggy.databaseUrl" . | quote }}
            {{- else if .Values.externalDatabase.existingSecret }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalDatabase.existingSecret }}
                  key: {{ .Values.externalDatabase.existingSecretKey }}
            {{- else }}
            - name: DATABASE_URL
              value: {{ .Values.externalDatabase.url | quote }}
            {{- end }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "foggy.secretName" . }}
                  key: JWT_SECRET
            - name: AGENT_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "foggy.secretName" . }}
                  key: AGENT_API_TOKEN
            - name: CONNECTOR_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "foggy.secretName" . }}
                  key: CONNECTOR_ENCRYPTION_KEY
            - name: FOGGY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "foggy.adminSecretName" . }}
                  key: password
            # Self-hosted edition toggles — defaults cloud-friendly (true) in the
            # foggy app settings, so the chart explicitly overrides to false for
            # self-hosted deployments. SQLAdmin panel should never be exposed to
            # end users; the demo project seeder is only useful for local dev.
            - name: ENABLE_ADMIN_PANEL
              value: "false"
            - name: SEED_DEMO_PROJECT
              value: "false"
            {{- with .Values.consoleBackend.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          # Startup probe guards the dbmate migration phase. The backend
          # entrypoint runs all pending migrations before uvicorn binds, so
          # first-ever installs on small DBs take ~2-5s, but customers with
          # months of alert history can take 20-60s. Without a startupProbe
          # the livenessProbe's initialDelaySeconds race would either kill
          # the pod mid-migration (too short) or hide a genuinely stuck
          # process for a full minute (too long). Kubernetes disables
          # readiness/liveness while startupProbe is active — exactly the
          # behaviour we want during migrations.
          # 30 × 5s = 150s budget covers every migration size we've seen.
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            {{- toYaml .Values.consoleBackend.resources | nindent 12 }}
      {{- with .Values.consoleBackend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.consoleBackend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.consoleBackend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
