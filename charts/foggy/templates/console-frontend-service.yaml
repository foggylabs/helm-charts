{{- /*
The console-frontend Service is the customer's primary entry point to Foggy.
Named `<release>-console` (not `<release>-console-frontend`) so the install
docs can say `kubectl port-forward svc/foggy-console 8080:80` with minimal
friction. Nginx inside the pod proxies /api and /admin to the backend Service.
*/}}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-console
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "foggy.labels" . | nindent 4 }}
    app.kubernetes.io/component: console-frontend
spec:
  type: {{ .Values.consoleFrontend.service.type }}
  ports:
    - name: http
      port: {{ .Values.consoleFrontend.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "foggy.componentSelectorLabels" (dict "ctx" . "component" "console-frontend") | nindent 4 }}
