apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "foggy.fullname" . }}-console-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "foggy.labels" . | nindent 4 }}
    app.kubernetes.io/component: console-frontend
spec:
  replicas: {{ .Values.consoleFrontend.replicas }}
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "foggy.componentSelectorLabels" (dict "ctx" . "component" "console-frontend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "foggy.componentSelectorLabels" (dict "ctx" . "component" "console-frontend") | nindent 8 }}
      annotations:
        # Roll the frontend when the nginx config changes.
        checksum/nginx-config: {{ include (print $.Template.BasePath "/configmap-console-nginx.yaml") . | sha256sum }}
        {{- with .Values.consoleFrontend.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.global.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: console-frontend
          image: {{ include "foggy.image" (dict "ctx" . "image" .Values.consoleFrontend.image) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.consoleFrontend.service.targetPort }}
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            {{- toYaml .Values.consoleFrontend.resources | nindent 12 }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "foggy.fullname" . }}-console-nginx
      {{- with .Values.consoleFrontend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.consoleFrontend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.consoleFrontend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
