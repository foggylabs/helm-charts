apiVersion: v1
kind: Service
metadata:
  name: {{ include "foggy.fullname" . }}-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "foggy.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  type: {{ .Values.agent.service.type }}
  ports:
    - name: http
      port: {{ .Values.agent.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "foggy.componentSelectorLabels" (dict "ctx" . "component" "agent") | nindent 4 }}
