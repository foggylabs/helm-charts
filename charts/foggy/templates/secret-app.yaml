{{- /*
Application-level secrets consumed by the Agent and Console Backend pods.

Keys:
  JWT_SECRET                — signs user session JWTs
  AGENT_API_TOKEN           — shared secret for Console Backend -> Agent calls
                              (the Agent reads the same value as AUTH_TOKEN)
  CONNECTOR_ENCRYPTION_KEY  — Fernet key; encrypts connector credentials at rest

All three are auto-generated on first install and preserved across upgrades
(via helm.sh/resource-policy: keep + lookup). If `secrets.existingSecret` is
set, the chart creates no Secret and both Deployments mount the pre-existing
one instead.
*/}}
{{- if not .Values.secrets.existingSecret }}
{{- $secretName := include "foggy.secretName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $jwtSecret := "" }}
{{- $agentToken := "" }}
{{- $fernetKey := "" }}
{{- if $existing }}
{{- $jwtSecret = index $existing.data "JWT_SECRET" | b64dec }}
{{- $agentToken = index $existing.data "AGENT_API_TOKEN" | b64dec }}
{{- $fernetKey = index $existing.data "CONNECTOR_ENCRYPTION_KEY" | b64dec }}
{{- else }}
{{- $jwtSecret = randAlphaNum 48 }}
{{- $agentToken = randAlphaNum 48 }}
{{- /* Fernet keys must be 32 raw bytes base64url-encoded. `randBytes` returns
     standard base64; we swap the two characters that differ between the
     standard and URL-safe alphabets so cryptography.fernet can decode it. */}}
{{- $fernetKey = randBytes 32 | replace "+" "-" | replace "/" "_" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "foggy.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  JWT_SECRET: {{ $jwtSecret | b64enc | quote }}
  AGENT_API_TOKEN: {{ $agentToken | b64enc | quote }}
  CONNECTOR_ENCRYPTION_KEY: {{ $fernetKey | b64enc | quote }}
{{- end }}
