{{- /*
Admin bootstrap Secret. On first install we generate a random password that
the admin must change on first login (handled inside the Foggy console UI).

On `helm upgrade` we read the existing Secret and keep whatever is there so we
don't rotate the admin password on every upgrade — until the admin has logged
in once and set their own, this is the only password that exists.
*/}}
{{- if and .Values.admin.generatePassword (not .Values.admin.existingSecret) }}
{{- $secretName := include "foggy.adminSecretName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $password := "" }}
{{- if $existing }}
{{- $password = index $existing.data "password" | b64dec }}
{{- else }}
{{- $password = randAlphaNum 24 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "foggy.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  password: {{ $password | b64enc | quote }}
{{- end }}
