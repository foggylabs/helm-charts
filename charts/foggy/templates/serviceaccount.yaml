{{- /*
ServiceAccount for the Agent pod. Created independently of `rbac.enabled`
so customers who set `rbac.enabled: false` (e.g. bringing their own role
via `customClusterRoleName` or disabling the Kubernetes connector
entirely) still get a working SA for the pod to run under. Without this,
the Agent Deployment would reference a non-existent SA and fail to
schedule.
*/}}
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "foggy.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "foggy.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
